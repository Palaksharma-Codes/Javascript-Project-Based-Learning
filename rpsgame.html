<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Game</title>
    <style>
         /*This is a CSS Code*/
        body {
            text-align: center;
            margin-top: 100px;
            font-family: Arial, Helvetica, sans-serif;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <!--This is a HTML Code-->
    <h1>Rock Paper Scissors</h1>
    <button onclick="play('Rock')">Rock</button>
    <button onclick="play('Paper')">Paper</button>
    <button onclick="play('Scissors')">Scissors</button>
    <p id="result"></p>
    <h4 id="score">Your score:0 | Computer score:0</h4>
<script>
    //This is a Javascript Code
    let userScore=0;
    let computerScore=0;
    function play(userChoice) {
        let choices=["Rock","Paper","Scissors"];
        let computerChoice= choices[Math.floor(Math.random()*3)];
        let result="";
        if (userChoice===computerChoice) {
            result="Draw!";
        }
        else if (
            (userChoice==="Rock" && computerChoice==="Scissors")||
            (userChoice==="Paper" && computerChoice==="Rock")||
            (userChoice==="Scissors" && computerChoice==="Paper")
        ) {
            result="You Win!";
            userScore++;
        }
        else {
            result="Computer Wins!";
            computerScore++;
        }
        document.getElementById("result").innerText="You:"+userChoice+ " | computer:"+computerChoice+ " | "+result;
        document.getElementById("score").innerText= "Your score:"+userScore+"|Computer score:"+computerScore;
    }
</script>
</body>
</html>
