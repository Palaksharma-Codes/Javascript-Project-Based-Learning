<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            text-align: center;
            margin-top: 100px;
            font-family: Arial, Helvetica, sans-serif;
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <h1>Dice Roller</h1>
    <button onclick="rollDice()">Roll Dice</button>
    <h2 id="result"></h2>
    
    <script>
        function rollDice() {
            let dice1=Math.floor(Math.random()*6)+1;
            let dice2=Math.floor(Math.random()*6)+1;
            let diceEmoji=[ "", "⚀", "⚁","⚂", "⚃","⚄","⚅"];
            let total=dice1+dice2;
            document.getElementById("result").innerText=diceEmoji[dice1]+""+diceEmoji[dice2]+"\nTotal:"+total;
           }
    </script>
</body>
</html>
