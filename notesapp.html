<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App</title>
    <style>
        body {
            text-align: center;
            margin-top: 100px;
            font-family: Arial, Helvetica, sans-serif;
        }
        textarea {
            width: 300px;
            height: 120px;
            padding: 10px;
            font-size: 18px;
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            margin: 10px;
        }
    </style>
</head>
<body>
    <h1>Notes App</h1>
    <textarea id="note" placeholder="Enter Your Note Here.."></textarea>
        <br><br>
    <button onclick="saveNote()">Save Note</button>
    <button onclick="deleteNote()">Delete Note</button>
    <h2>Your Note:</h2>
    <p id="savedNote"></p>

<script>
    let savedNote=localStorage.getItem("note");
    let savedTime=localStorage.getItem("time");
    if(savedNote) {
        document.getElementById("savedNote").innerText="📌"+savedNote+"\n\nSaved on:"+savedTime;
    }
    function saveNote() {
        let note=document.getElementById("note").value.trim();
        if(note===""){
            alert("Please enter a note!");
            return;
        }
        let now=new Date();
        let dateTime=now.toLocaleString();
        localStorage.setItem("note",note);
        localStorage.setItem("time",dateTime);
        document.getElementById("savedNote").innerText="📌"+note+"\n\nSaved on:"+dateTime;
        document.getElementById("note").value="";
    }
    function deleteNote() {
        localStorage.removeItem("note");
        localStorage.removeItem("time");
        document.getElementById("savedNote").innerText="";
    }
</script>
</body>
</html>
