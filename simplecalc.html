<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <style>
        body {
            text-align: center;
            margin-top: 100px;
            font-family: Arial, Helvetica, sans-serif;
        }
        input,button {
            padding: 10px;
            font-size: 18px;
            margin: 5px;
        }
    </style>
</head>
<body>
    <h1>Simple Calculator</h1>
    <input type="number" id="num1" placeholder="First Number">
    <br><br>
    <input type="number" id="num2" placeholder="Second Number">
    <br><br>
    <button onclick="add()">+</button>
    <button onclick="subtract()">-</button>
    <button onclick="multiply()">*</button>
    <button onclick="divide()">/</button>
    <button onclick="clearInputs()">Clear</button>
    <h2 id="result"></h2>

<script>
    function add() {
        let num1=parseFloat(
            document.getElementById("num1").value
        );
        let num2=parseFloat(
            document.getElementById("num2").value
        );
        document.getElementById("result").innerText="Result:"+(num1+num2).toFixed(2);
    }
     function subtract() {
        let num1=parseFloat(
            document.getElementById("num1").value
        );
        let num2=parseFloat(
            document.getElementById("num2").value
        );
        document.getElementById("result").innerText="Result:"+(num1-num2).toFixed(2);
    }
     function multiply() {
        let num1=parseFloat(
            document.getElementById("num1").value
        );
        let num2=parseFloat(
            document.getElementById("num2").value
        );
        document.getElementById("result").innerText="Result:"+(num1*num2).toFixed(2);
    }
     function divide() {
        let num1=parseFloat(
            document.getElementById("num1").value
        );
        let num2=parseFloat(
            document.getElementById("num2").value
        );
        if(num2===0) {
            document.getElementById("result").inneText="Cannot divide by 0";
        }
        else {
        document.getElementById("result").innerText="Result:"+(num1/num2).toFixed(2);
        }
    }
    function clearInputs(){
        document.getElementById("num1").value="";
        document.getElementById("num2").value="";
        document.getElementById("result").innerText="";
    }
</script>
</body>
</html>
