<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palindrome Checker</title>
    <style>
        body {
            text-align: center;
            margin-top: 100px;
            font-family: Arial, Helvetica, sans-serif;
        }
        input,button {
            padding: 10px;
            font-size: 18px;
            margin: 5px;
        }
    </style>
</head>
<body>
    <h1>Palindrome checker</h1>
    <input type="text" id="word" placeholder="Enter a  word">
    <button onclick="checkPalindrome()">Check</button>
    <h2 id="result"></h2>

<script>
    function checkPalindrome() {
        let word=document.getElementById("word").value;
        if(word.trim()==="") {
            document.getElementById("result").innerText="Please enter a word";
            return;
        }
        word=word.toLowerCase().replaceAll("","");
        let reversed=word.split("").reverse().join("");
        if(word===reversed) {
            document.getElementById("result").innerText=word+" is a Palindrome.\nReversed:"+reversed;
        }
        else {
            document.getElementById("result").innerText=word+" is not a Palindrome.\nReversed:"+reversed;
        }
    }
</script>
</body>
</html>
